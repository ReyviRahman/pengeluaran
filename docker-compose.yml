services:
  db:
    image: postgres:17-alpine
    container_name: belajar-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-belajarai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-belajarai}
      POSTGRES_DB: ${POSTGRES_DB:-belajar_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-belajarai} -d ${POSTGRES_DB:-belajar_ai}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: belajar-ai-app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-belajarai}:${POSTGRES_PASSWORD:-belajarai}@db:5432/${POSTGRES_DB:-belajar_ai}
    ports:
      - "8000:8000"
    volumes:
      - ./credentials.json:/app/credentials.json:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
